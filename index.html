<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生協すごろく - クイズ＆パーセント</title>
    <style>
        :root { --vh: 100vh; }
        body {
            margin: 0; background-color: #1a252f; color: white; font-family: sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; height: 100dvh; overflow: hidden; text-align: center;
            touch-action: manipulation;
        }
        #display-container {
            width: 85%; max-width: 800px; min-height: 300px; padding: 30px 15px;
            border: 6px solid #f1c40f; border-radius: 25px; background-color: #2c3e50;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 90px;
            position: relative; z-index: 10; display: flex; flex-direction: column;
            transition: border-color 0.3s ease;
        }
        .label { font-size: 1.2rem; color: #f1c40f; margin-bottom: 20px; font-weight: bold; height: 2.5rem; }
        .content { 
            flex-grow: 1; font-size: 1.8rem; line-height: 1.4; font-weight: bold; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            position: relative; overflow: hidden; transition: opacity 0.1s ease-in;
        }
        
        .choice-container { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 320px; margin-top: 10px; align-items: stretch; }
        .choice-btn {
            flex: 1; padding: 15px; border-radius: 15px; border: none; color: white;
            font-size: 1.3rem; font-weight: bold; cursor: pointer; transition: transform 0.1s;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80px; line-height: 1.2;
        }
        .choice-btn span { font-size: 0.75rem; opacity: 0.9; margin-top: 4px; font-weight: normal; display: block; }
        .choice-btn:active { transform: scale(0.95); opacity: 0.8; }
        .btn-quiz { background-color: #3498db; box-shadow: 0 4px #2980b9; }
        .btn-percent { background-color: #9b59b6; box-shadow: 0 4px #8e44ad; }
        .btn-empty { background-color: #7f8c8d !important; box-shadow: 0 4px #666 !important; opacity: 0.7; }

        @media (min-width: 768px) {
            .label { font-size: 2rem; height: 3.5rem; }
            .content { font-size: 3.5rem; min-height: 250px; }
            #display-container { border-width: 10px; padding: 50px; min-height: 450px; }
            .choice-container { max-width: 650px; flex-direction: row; }
            .choice-btn { font-size: 1.6rem; min-height: 120px; }
            .choice-btn span { font-size: 0.9rem; }
        }

        .controls { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; height: 90px; background: #34495e; z-index: 100; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); }
        .btn { flex: 1; border: none; color: white; font-size: 1.3rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; background: none; }
        .btn:active { opacity: 0.6; background-color: rgba(255,255,255,0.1); }
        #back-btn { background-color: #7f8c8d; border-right: 2px solid #2c3e50; }
        #next-btn { background-color: #2980b9; }
        #force-quit-btn { position: fixed; top: env(safe-area-inset-top, 20px); right: 20px; padding: 12px 18px; background: rgba(46, 204, 113, 0.9); color: white; border: 2px solid white; border-radius: 30px; font-weight: bold; font-size: 0.9rem; display: none; z-index: 2000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #custom-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .modal-card { background: #34495e; padding: 30px; border-radius: 20px; border: 4px solid #f1c40f; width: 80%; max-width: 400px; }
        .modal-text { font-size: 1.2rem; font-weight: bold; margin-bottom: 30px; line-height: 1.5; color: white; text-align: center;}
        .modal-btns { display: flex; gap: 15px; }
        .m-btn { flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .m-ok { background: #2ecc71; color: white; }
        .m-cancel { background: #95a5a6; color: white; }
        #history-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; padding: 25px; box-sizing: border-box; overflow-y: auto; z-index: 2500; }
        .history-section-title { font-size: 1.4rem; color: #f1c40f; margin: 30px 0 15px; text-align: left; border-bottom: 2px solid #f1c40f; padding-bottom: 5px; }
        .history-item { text-align: left; border-left: 4px solid #7f8c8d; padding-left: 10px; margin-bottom: 20px; }
        .history-q { font-size: 1rem; color: #bdc3c7; }
        .history-a { font-size: 1.2rem; color: #f1c40f; font-weight: bold; }
        #reset-btn-trigger { margin-top: 40px; padding: 15px; background: #c0392b; color: white; border: none; border-radius: 10px; font-weight: bold; flex-shrink: 0;}
    </style>
</head>
<body>

<button id="force-quit-btn" onclick="askFinish()">🏁 全員ゴール！</button>
<div id="display-container">
    <div id="label" class="label"></div>
    <div id="content" class="content"></div>
</div>
<div class="controls" id="controls-area">
    <button class="btn" id="back-btn" onclick="handleBack()">← もどる</button>
    <button class="btn" id="next-btn" onclick="handleNext()">つぎへ →</button>
</div>

<div id="custom-modal"><div class="modal-card"><div id="modal-msg" class="modal-text"></div><div class="modal-btns"><button class="m-btn m-cancel" onclick="closeModal()">キャンセル</button><button id="modal-confirm-btn" class="m-btn m-ok">OK</button></div></div></div>
<div id="history-overlay" onclick="closeHistory()"><div style="color:#bdc3c7; margin-bottom:20px;">閉じる [タップ]</div><div id="history-list"></div><button id="reset-btn-trigger" onclick="askReset(event)">⚠ リセットして最初から</button></div>

<script>
    const quizData = [
        { q: "マッチとライター。先に発明されたのはどちらでしょう？", a: "ライター" },
        { q: "不燃性のガスであるため飛行機のタイヤにも採用されている、大気中で最も多い気体は何でしょう？", a: "窒素" },
        { q: "輸血を必要とする患者のために、健康な人が自主的に血液を提供する行為を何というでしょう？", a: "献血" },
        { q: "体長14cm、体重8gほどであり、真っ白もふもふなフォルムから、「雪の妖精」とも呼ばれるかわいい鳥は何でしょう？", a: "シマエナガ" },
        { q: "バンド・Mrs. GREEN APPLEの代表曲の1つで、スペイン語で「なるようになる」という意味の単語は何でしょう？", a: "ケセラセラ" },
        { q: "室町将軍で、名前に「義」という漢字を持たない唯一の将軍で、初代の将軍でもある人物は誰でしょう？", a: "足利尊氏" },
        { q: "全国の都道府県のうち、最も市町村の数が多いのはどの都道府県でしょう？", a: "北海道" },
        { q: "歌集において、和歌の作者が明確でない時に記載される言葉は何でしょう？", a: "詠み人知らず" },
        { q: "排他的経済水域とは、沿岸から何海里までの範囲を指すでしょう?", a: "200海里" },
        { q: "マイクロ、ホール、駒込などの種類がある、液体を少量採るのに用いられる実験器具は何でしょう？", a: "ピペット" },
        { q: "FRUITS ZIPPERやCANDY TUNEなどが所属し、「原宿から世界へ」がコンセプトである、アイドルプロジェクトは何でしょう？", a: "KAWAII LAB.(カワイイラボ)" },
        { q: "車が、すぐに停車できるような速度で進むことを、漢字2文字で何というでしょう？", a: "徐行" },
        { q: "これを2乗したものは分散と呼ばれる、統計学においてあるデータのばらつきを示す指標を何というでしょう？", a: "標準偏差" },
        { q: "同じ学校の卒業生たちが、交流などを目的として集まるイベントのことを、漢字3文字で何というでしょう？", a: "同窓会" },
        { q: "日本のマイナンバー制度において、個人に与えられるマイナンバーは何桁でしょう？", a: "12桁" },
        { q: "セブンイレブンのロゴの中で、唯一小文字で書かれているアルファベットは何でしょう？", a: "n" },
        { q: "名詞だと「遺言」や「意志」という意味になる、英語で推測や単純未来を表す助動詞は何でしょう？", a: "will" },
        { q: "有名な戦法に「る攻め」がある、相手の言った言葉の最後の文字から始まる単語を言い合うという言葉遊びは何でしょう？", a: "しりとり" },
        { q: "一般に「世界三大穀物」と言われる3種類の穀物とは、米、小麦と何でしょう？", a: "トウモロコシ" },
        { q: "手紙をかくときのマナーで、「拝啓」から文章を始めた場合、文末に用いる漢字2文字の言葉は何でしょう？", a: "敬具" },
        { q: "労働基準法第32条によると、使用者は労働者に1日当たり何時間を超えて労働させてはならないとされているでしょう？", a: "8時間" },
        { q: "√2が無理数であることの証明に使われることで知られる、命題が成り立たないと仮定して矛盾を導き、元の命題が正しいことを示す証明方法は何でしょう？", a: "背理法" },
        { q: "秋田大学生協ではレンタカーや旅行の予約ができる。○か×か。", a: "○" },
        { q: "秋田大学生協の店舗、coopleでは本などを買うと何%のポイントがつくでしょう？？", a: "10%" },
        { q: "ドーナツとマグカップとの関係でも知られる、物体や空間の形状を連続的に変形しても変わらない性質を研究する数学の分野は何でしょう？", a: "トポロジー(位相幾何学" },
        { q: "ある命題ののこれは元の命題と真偽が同じくなる、ある命題の、仮定と結論を否定して入れ替えた命題を何というでしょう？", a: "対偶" },
        { q: "化学式C<sub>34</sub>H<sub>47</sub>NO<sub>11</sub>で表される、トリカブトの毒として知られるアルカロイドの一種は何でしょう？？", a: "アコニチン" },
        { q: "特に恋愛について用いられることがおおい、希望が叶う見込みがある、ということを人間の生命活動にたとえて「何がある」というでしょう？", a: "脈がある" },
        { q: "2つの直線が交わってできる4つの角のうち、互いに等しくなる向かい合った二角のことを何というでしょう？", a: "対頂角" },
        { q: "水が溜まった道路上を摩耗したタイヤで走ると起こる、車が水の上を滑る現象を何というでしょう？", a: "ハイドロプレーニング現象" },
        { q: "ABO式血液型などのように、3つ以上の対立遺伝子によって発言形質が決定されるような遺伝子を何というでしょう？", a: "複対立遺伝子" },
        { q: "古文の動詞の活用で、唯一「蹴る」のみがとる活用型は何でしょう？", a: "下一段活用" },
        { q: "最大で2つの電子を収容できる、電子殻のうち、原子核に最も近いものを何というでしょう？", a: "K殻" },
        { q: "11と13、17と19のように、連続した奇数が素数となる組み合わせのことを何というでしょう？", a: "双子素数" },
        { q: "いわゆるMARCHと呼ばれる5つの大学のうち、現在大学生協がない大学はいくつあるでしょう？", a: "3つ" },
        { q: "多くの提灯をさげた竹竿を稲穂に見立て、高く掲げて街を練り歩く、夏の秋田の風物詩は何でしょう？", a: "あきた竿燈まつり" },
        { q: "「笑って★ダチエル」を開催しているのは、なんという組織でしょう？", a: "秋田大学生協学生委員会" },
        { q: "日本一高い山は何でしょう？", a: "富士山" },
        { q: "秋田県仙北市に位置し、日本で1番、世界では17番目に深い湖は何でしょう？", a: "田沢湖" },
        { q: "ある物体の速さが2倍になると、その物体のもつ運動エネルギーは何倍になるでしょう？", a: "4倍" },
        { q: "物理学で使われる「静止摩擦係数」と「動摩擦係数」のうち、一般に大きいのはどちらでしょう？", a: "静止摩擦係数" },
        { q: "波長はおよそ1ナノメートルから380ナノメートルである、殺菌作用や人間を日焼けさせる効果を持つ電磁波は何でしょう？", a: "紫外線" },
        { q: "ことわざにおいて、「トマトが赤くなると青くなる」と言われるのはどんな職業の人でしょう？", a: "医者" },
        { q: "1つの六角形に対角線は何本引けるでしょう？", a: "9本" },
    ];

    const percentData = [
        { q: "「朝食はパン派」と答えた大学生の割合は？", a: "42%" },
        { q: "「一人暮らしをしている」と答えた学生の割合は？", a: "65%" },
        { q: "「週に3回以上コンビニを利用する」人の割合は？", a: "78%" },
        { q: "「スマホの充電が20%を切ると不安になる」人の割合は？", a: "55%" },
        { q: "「自分の名前の由来を知っている」人の割合は？", a: "88%" }
    ];

    let state = { quizPool: [], percentPool: [], history: [], currentIndex: 0, phase: 0, currentType: 'quiz' };

    function saveState() { localStorage.setItem('seikyo_sugoroku_fixed', JSON.stringify(state)); }
    function loadState() {
        const saved = localStorage.getItem('seikyo_sugoroku_fixed');
        if (saved) { state = JSON.parse(saved); return true; }
        return false;
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function init() {
        if (!loadState()) {
            state.quizPool = [...quizData];
            state.percentPool = [...percentData];
            shuffle(state.quizPool); shuffle(state.percentPool);
        }
        updateDisplay();
    }

    function selectType(type) {
        let targetPool = type === 'quiz' ? state.quizPool : state.percentPool;
        if (targetPool.length === 0) {
            const otherType = type === 'quiz' ? 'percent' : 'quiz';
            const otherPool = otherType === 'quiz' ? state.quizPool : state.percentPool;
            if (otherPool.length > 0) { state.currentType = otherType; }
            else { state.phase = 4; saveState(); updateDisplay(); return; }
        } else { state.currentType = type; }
        state.phase = 2; saveState(); updateDisplay();
    }

    function handleNext() {
        if (state.phase === 0) { state.phase = 1; }
        else if (state.phase === 2) { state.phase = 3; }
        else if (state.phase === 3) {
            const pool = state.currentType === 'quiz' ? state.quizPool : state.percentPool;
            if (pool.length > 0) {
                state.history.push({ type: state.currentType, q: pool[0].q, a: pool[0].a });
                pool.shift(); // ここで削除される
            }
            if (state.quizPool.length === 0 && state.percentPool.length === 0) { state.phase = 4; }
            else { state.currentIndex++; state.phase = 1; }
        }
        saveState(); updateDisplay();
    }

    // ★バグ修正ポイント：履歴から戻す処理
    function handleBack() {
        if (state.phase === 1) {
            if (state.currentIndex > 0) {
                state.currentIndex--;
                // 履歴から削除したばかりの問題を戻す
                const lastMove = state.history.pop();
                state.currentType = lastMove.type;
                const pool = lastMove.type === 'quiz' ? state.quizPool : state.percentPool;
                pool.unshift({ q: lastMove.q, a: lastMove.a }); // プールの先頭に復活させる
                state.phase = 3; 
            } else { state.phase = 0; }
        }
        else if (state.phase === 2) { state.phase = 1; }
        else if (state.phase === 3) { state.phase = 2; }
        saveState(); updateDisplay();
    }

    function askFinish() {
        showModal("全員ゴールしましたか？\n終了画面へ移動します。", () => {
            state.phase = 4; saveState(); updateDisplay();
        });
    }

    function updateDisplay() {
        const labelEl = document.getElementById('label');
        const contentEl = document.getElementById('content');
        const fqBtn = document.getElementById('force-quit-btn');
        const controls = document.getElementById('controls-area');
        const nextBtn = document.getElementById('next-btn');
        const container = document.getElementById('display-container');

        contentEl.style.opacity = 0;
        setTimeout(() => {
            fqBtn.style.display = (state.phase === 1) ? "block" : "none";
            controls.style.display = (state.phase === 4) ? "none" : "flex";
            nextBtn.style.visibility = (state.phase === 1) ? "hidden" : "visible";

            if (state.phase === 0) {
                labelEl.innerText = "GAME START";
                contentEl.innerHTML = "<div>生協すごろく</div>";
                container.style.borderColor = "#f1c40f";
            } else if (state.phase === 1) {
                labelEl.innerText = "READY";
                const qEmpty = state.quizPool.length === 0;
                const pEmpty = state.percentPool.length === 0;
                const qBtnHtml = qEmpty ? "クイズマス<span>(品切れのためパーセントが出題されます)</span>" : "クイズマス";
                const pBtnHtml = pEmpty ? "パーセントマス<span>(品切れのためクイズが出題されます)</span>" : "パーセントマス";
                contentEl.innerHTML = `
                    <div style="margin-bottom:20px;">第 ${state.currentIndex + 1} 問</div>
                    <div class="choice-container">
                        <button class="choice-btn btn-quiz ${qEmpty ? 'btn-empty' : ''}" onclick="selectType('quiz')">${qBtnHtml}</button>
                        <button class="choice-btn btn-percent ${pEmpty ? 'btn-empty' : ''}" onclick="selectType('percent')">${pBtnHtml}</button>
                    </div>
                `;
                container.style.borderColor = "#f1c40f";
            } else if (state.phase === 2 || state.phase === 3) {
                const pool = state.currentType === 'quiz' ? state.quizPool : state.percentPool;
                const typeName = state.currentType === 'quiz' ? "クイズ" : "パーセント";
                if (state.phase === 2) {
                    labelEl.innerText = `第 ${state.currentIndex + 1} 問：${typeName}`;
                    contentEl.innerHTML = `<div>${pool[0].q}</div>`;
                    container.style.borderColor = state.currentType === 'quiz' ? "#3498db" : "#9b59b6";
                } else {
                    labelEl.innerText = `第 ${state.currentIndex + 1} 問：解答`;
                    contentEl.innerHTML = `<div>${pool[0].a}</div>`;
                    container.style.borderColor = "#e74c3c";
                }
            } else if (state.phase === 4) {
                labelEl.innerText = "GOAL!!";
                contentEl.innerHTML = `<div>全行程が終了しました！</div><div style='font-size:1.1rem; color:#bdc3c7; margin-top:30px;' onclick='toggleHistory()'>[ 問題一覧を確認する ]</div>`;
                container.style.borderColor = "#2ecc71";
            }
            contentEl.style.opacity = 1;
        }, 50);
    }

    function showModal(msg, onConfirm) {
        document.getElementById('modal-msg').innerText = msg;
        const confirmBtn = document.getElementById('modal-confirm-btn');
        confirmBtn.onclick = () => { onConfirm(); closeModal(); };
        document.getElementById('custom-modal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('custom-modal').style.display = 'none'; }

    function toggleHistory() {
        const overlay = document.getElementById('history-overlay');
        const list = document.getElementById('history-list');
        list.innerHTML = "";
        let html = '<div class="history-section-title">【出題した問題】</div>';
        if (state.history.length === 0) html += "<div style='color:#7f8c8d;'>まだありません</div>";
        state.history.forEach((item, i) => {
            const typeLabel = item.type === 'quiz' ? '[クイズ]' : '[パーセント]';
            html += `<div class="history-item"><div class="history-q">${i+1}. ${typeLabel} ${item.q}</div><div class="history-a">正解：${item.a}</div></div>`;
        });
        html += '<div class="history-section-title">【未出題のクイズ】</div>';
        state.quizPool.forEach((item) => { html += `<div class="history-item"><div class="history-q">${item.q}</div><div class="history-a">正解：${item.a}</div></div>`; });
        html += '<div class="history-section-title">【未出題のパーセント】</div>';
        state.percentPool.forEach((item) => { html += `<div class="history-item"><div class="history-q">${item.q}</div><div class="history-a">正解：${item.a}</div></div>`; });
        list.innerHTML = html; overlay.style.display = "flex";
    }
    function closeHistory() { document.getElementById('history-overlay').style.display = "none"; }
    function askReset(e) {
        e.stopPropagation();
        showModal("リセットして最初からやり直しますか？", () => {
            localStorage.removeItem('seikyo_sugoroku_fixed');
            location.reload();
        });
    }
    init();
</script>
</body>
</html>
