<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生協すごろく - クイズマス</title>
    <style>
        body {
            margin: 0;
            background-color: #1a252f;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
            touch-action: manipulation;
        }
        #display-container {
            width: 90%;
            max-width: 800px;
            padding: 30px 15px;
            border: 6px solid #f1c40f;
            border-radius: 25px;
            background-color: #2c3e50;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 80px;
        }
        .label { font-size: 1.2rem; color: #f1c40f; margin-bottom: 10px; font-weight: bold; }
        .content { 
            font-size: 1.8rem; 
            line-height: 1.4; 
            font-weight: bold; 
            min-height: 150px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            /* 描画残りを防ぐため背景色を明示 */
            background-color: transparent; 
        }

        @media (min-width: 768px) {
            .label { font-size: 2rem; }
            .content { font-size: 3.5rem; min-height: 250px; }
            #display-container { border-width: 10px; padding: 50px; }
        }

        .controls {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            height: 90px;
            background: #34495e;
            z-index: 100;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
        }
        .btn {
            flex: 1;
            border: none;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn:active { opacity: 0.6; }
        #back-btn { background-color: #7f8c8d; border-right: 2px solid #2c3e50; }
        #next-btn { background-color: #2980b9; }

        #force-quit-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            padding: 8px 12px;
            background: rgba(46, 204, 113, 0.5);
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 20px;
            font-size: 0.8rem;
            display: none;
            z-index: 50;
        }

        #history-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; flex-direction: column;
            padding: 25px; box-sizing: border-box; overflow-y: auto; z-index: 200;
        }
        .history-item { text-align: left; border-left: 4px solid #7f8c8d; padding-left: 10px; margin-bottom: 20px; }
        .history-q { font-size: 1rem; color: #bdc3c7; }
        .history-a { font-size: 1.2rem; color: #f1c40f; font-weight: bold; }
        
        #reset-btn { margin-top: 40px; padding: 15px; background: #c0392b; color: white; border: none; border-radius: 10px; font-weight: bold;}
    </style>
</head>
<body>

<button id="force-quit-btn" onclick="jumpToFinish()">🏁 全員ゴール！</button>

<div id="display-container">
    <div id="label" class="label"></div>
    <div id="content" class="content"></div>
</div>

<div class="controls" id="controls-area">
    <button class="btn" id="back-btn" onclick="handleBack()">← もどる</button>
    <button class="btn" id="next-btn" onclick="handleNext()">つぎへ →</button>
</div>

<div id="history-overlay" onclick="closeHistory()">
    <div style="color:#bdc3c7; margin-bottom:20px;">閉じる [タップ]</div>
    <div id="history-list"></div>
    <button id="reset-btn" onclick="fullReset()">⚠ リセットして最初から</button>
</div>

<script>
    const quizData = [
        { q: "マッチとライター。先に発明されたのはどちらでしょう？", a: "ライター" },
        { q: "MARCHのうち、現在大学生協がない大学はいくつ？", a: "3つ" },
        { q: "稲穂に見立てた夏の秋田の風物詩は？", a: "あきた竿燈まつり" },
        { q: "秋田大学で進級要件となるTOEICのスコアは？", a: "400点" },
        { q: "大学生協でレンタカーや旅行の予約ができる。○か×か。", a: "○" },
        { q: "coopleで本を買うと何%のポイントがつく？", a: "10%" },
        { q: "「笑って★ダチエル」を開催している組織は？", a: "秋田大学生協学生委員会" },
        { q: "電気は停電。水の供給が止まることは？", a: "断水" },
        { q: "日本一高い山は何？", a: "富士山" }
    ];

    let state = {
        questions: [],
        currentIndex: 0,
        phase: 0,
        maxReachedIndex: -1
    };

    function saveState() {
        localStorage.setItem('seikyo_quiz_state', JSON.stringify(state));
    }

    function loadState() {
        const saved = localStorage.getItem('seikyo_quiz_state');
        if (saved) {
            state = JSON.parse(saved);
            return true;
        }
        return false;
    }

    function fullReset(e) {
        if(e) e.stopPropagation();
        if(confirm("リセットして最初からやり直しますか？")) {
            localStorage.removeItem('seikyo_quiz_state');
            location.reload();
        }
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function init() {
        if (!loadState()) {
            state.questions = [...quizData];
            shuffle(state.questions);
        }
        updateDisplay();
    }

    function handleNext() {
        if (state.phase === 0) { state.phase = 1; }
        else if (state.phase === 1) { state.phase = 2; state.maxReachedIndex = Math.max(state.maxReachedIndex, state.currentIndex); }
        else if (state.phase === 2) { state.phase = 3; }
        else if (state.phase === 3) {
            if (state.currentIndex < state.questions.length - 1) {
                state.currentIndex++;
                state.phase = 1;
            } else { state.phase = 4; }
        }
        saveState();
        updateDisplay();
    }

    function handleBack() {
        if (state.phase === 1) {
            if (state.currentIndex > 0) { state.currentIndex--; state.phase = 3; }
            else { state.phase = 0; }
        }
        else if (state.phase === 2) { state.phase = 1; }
        else if (state.phase === 3) { state.phase = 2; }
        else if (state.phase === 4) { state.phase = 3; }
        saveState();
        updateDisplay();
    }

    function jumpToFinish() {
        if(confirm("お疲れ様でした！\n(終了画面へ移動します)")) {
            state.phase = 4;
            saveState();
            updateDisplay();
        }
    }

    function updateDisplay() {
        const labelEl = document.getElementById('label');
        const contentEl = document.getElementById('content');
        const container = document.getElementById('display-container');
        const fqBtn = document.getElementById('force-quit-btn');
        const controls = document.getElementById('controls-area');

        // スマホの描画バグ対策: 一旦内容を空にする
        contentEl.innerHTML = "";
        contentEl.innerText = "";

        fqBtn.style.display = (state.phase === 1) ? "block" : "none";
        controls.style.display = (state.phase === 4) ? "none" : "flex";

        if (state.phase === 0) {
            labelEl.innerText = "GAME START";
            contentEl.innerHTML = "生協すごろく<br>クイズマス";
            container.style.borderColor = "#f1c40f";
        } else if (state.phase === 1) {
            labelEl.innerText = "READY";
            contentEl.innerText = `第 ${state.currentIndex + 1} 問`;
            container.style.borderColor = "#f1c40f";
        } else if (state.phase === 2) {
            labelEl.innerText = `第 ${state.currentIndex + 1} 問：問題`;
            contentEl.innerText = state.questions[state.currentIndex].q;
            container.style.borderColor = "#3498db";
        } else if (state.phase === 3) {
            labelEl.innerText = `第 ${state.currentIndex + 1} 問：解答`;
            contentEl.innerText = state.questions[state.currentIndex].a;
            container.style.borderColor = "#e74c3c";
        } else if (state.phase === 4) {
            labelEl.innerText = "GOAL!!";
            contentEl.innerHTML = `
                <div>おつかれさまでした！</div>
                <div style='font-size:1.1rem; color:#bdc3c7; margin-top:30px;' onclick='toggleHistory()'>[ 履歴を確認する ]</div>
            `;
            container.style.borderColor = "#2ecc71";
        }
    }

    function toggleHistory() {
        const overlay = document.getElementById('history-overlay');
        const list = document.getElementById('history-list');
        list.innerHTML = "";
        state.questions.forEach((item, i) => {
            if (i <= state.maxReachedIndex) {
                list.innerHTML += `<div class="history-item"><div class="history-q">第 ${i+1} 問：${item.q}</div><div class="history-a">正解：${item.a}</div></div>`;
            }
        });
        overlay.style.display = "flex";
    }

    function closeHistory() {
        document.getElementById('history-overlay').style.display = "none";
    }

    window.onbeforeunload = function(e) {
        return "中断しても続きから再開できますが、リロードしますか？";
    };

    init();
</script>
</body>
</html>
